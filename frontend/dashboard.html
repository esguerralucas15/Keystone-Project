<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 24px auto; padding: 20px; }
        .container { background: #f5f5f5; padding: 40px; border-radius: 8px; }
        h1 { color: #333; margin-bottom: 20px; }
        #status { color: #27ae60; background: #f0fff4; padding: 12px; border-radius: 4px; margin: 20px 0; }
        .buttons { display: flex; gap: 12px; margin: 30px 0; flex-wrap: wrap; }
        button { padding: 10px 20px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; transition: all 0.3s; }
        .btn-chatbot { background: #667eea; color: white; }
        .btn-chatbot:hover { background: #5568d3; }
        .btn-logout { background: #e74c3c; color: white; }
        .btn-logout:hover { background: #c0392b; }
    </style>
</head>

<body>
    <div class="container">
        <h1>Bienvenido <span id="username"></span></h1>

        <p id="status"></p>

        <div class="buttons">
            <button class="btn-chatbot" onclick="irAlChatbot()">💬 Asesor Financiero</button>
            <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
        </div>
    </div>

    <script>
        // 🔐 usuario
        const user = JSON.parse(localStorage.getItem("user"));

        // 🚨 si no hay usuario → login
        if (!user) {
            window.location.href = "/static/index.html";
        }

        // 👤 mostrar nombre
        if (user) {
            document.getElementById("username").innerText = user.name;
        }

        // 📊 estado
        document.getElementById("status").innerText =
            "Tu perfil financiero ha sido registrado correctamente ✅";

        // 🧠 debug
        console.log("Usuario:", user);

        // 💬 ir al chatbot
        function irAlChatbot() {
            window.location.href = "/static/chatbot.html";
        }

        // 🔓 logout
        function logout() {
            localStorage.removeItem("user");
            window.location.href = "/static/index.html";
        }
    </script>
</body>
</html>
